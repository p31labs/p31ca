name: Bug Report
description: Report a bug in the P31 EDE
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill out the details below.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Frontend (Dashboard)
        - Backend (FastAPI)
        - Firmware (ESP32-S3)
        - Extensions (VS Code)
        - Infrastructure (Docker/DevContainer)
        - Documentation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run just dev
        2. Open browser to...
        3. Click...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Environment
      placeholder: "e.g., Windows 11 + WSL2, macOS 14, Ubuntu 24.04"
