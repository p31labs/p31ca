; P31 Thick Click Firmware
; ESP32-S3 DevKitC-1 — Arduino Framework
; USB CDC on GPIO19/20 (native USB)

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Native USB CDC
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D P31_MAGIC_BYTE=0x31
    -D P31_CRC8_POLY=0x31
    -D P31_CRC8_INIT=0xFF
    -D P31_BAUD_RATE=115200

monitor_speed = 115200

; Libraries
lib_deps =
    adafruit/Adafruit DRV2605 Library@^1.2.4

; Build options
build_type = debug
board_build.f_cpu = 240000000L
